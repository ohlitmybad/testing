<html lang="en">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+Knujsl5+n9z6b8sVp5LeqL5u8LfwO8z9n6KVoWszZvOQcz" crossorigin="anonymous">

<style>body {
    font-family: Inter, sans-serif;
    margin: 0;
    padding: 20px; /* Adjust the padding to add more space */
    background-color: #1A1A1A;
    font-family: 'Inter', sans-serif;
}


.content {
    display: flex;
    flex-wrap: wrap;
    padding: 20px;
    justify-content: space-around;
}

.card {
    flex-basis: calc(30% - 10px); /* Adjust the flex-basis and margin */
    background-color: #f0f0f0;
    margin-bottom: 50px; /* Add margin between all cards */
    padding: 10px 5px 30px 7px; /* Adjust padding */
    text-align: center;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    border-radius: 15px;
    transition: transform 0.2s ease, background-color 0.2s ease; 
    display: flex; /* Flexbox layout */
    flex-direction: column; /* Stack children vertically */
    justify-content: space-between; /* Space between items */
    height:200px; /* Fixed height for demonstration */
    align-items: center; /* Center items horizontally */
    max-width: 200px; /* Ensure the image fits within the card */
    cursor: pointer;
}

.card h2 {
    margin-top: 10px; /* Add margin below headline */
    padding: 0px;
    font-size: 18px;
}

.card img {
    max-width: 50%; /* Ensure the image fits within the card */
    border-top-left-radius: 15px; /* Maintain border-radius for image corners */
    border-top-right-radius: 15px;
    display: block;
    margin-bottom: 30px;
    max-height: 50%;
}

.card p {
    margin-top: -4px; /* Adjust margin-top to maintain position */
    line-height: 1.7; /* Set line-height for better readability */
    font-size: 12px;
    font-family: Inter, sans-serif;
    color: 00000;
    display: flex;
    flex-direction: column; /* Display items in a column */
    justify-content: center;
    align-items: center;
    font-weight: thin;
}



@media (max-width: 768px) {
    .card {
        flex-basis: calc(100% - 0px); /* Adjust the flex-basis for smaller screens */
    }
}

@media (max-width: 576px) {
    .card {
        flex-basis: calc(100% - 0px); /* Adjust the flex-basis for even smaller screens */
    }
}

/* Add hover effect */
.card:hover {
    transform: scale(1.05); /* Scale the card slightly on hover */
    box-shadow: 0 0 20px rgba(0,0,0,0.1); /* Increase shadow on hover */
    background-color: #3D3D3D; /* Change background color on hover */
}

/* Add active effect */
.card:active {
    background-color: #c0c0c0; /* Change background color when card is clicked */
}

/* Change text color on hover */
.card:hover p {
    color: #333; /* Change text color on hover */
}

/* Change text color when card is clicked */
.card:active p {
    color: #fff; /* Change text color when card is clicked */
}

footer {
    color: white;
    text-align: center;
    padding: 15px;
    /* Remove fixed positioning */
    /* position: fixed;

    font-family: Inter, sans-serif;

}

footer a {
    color: white;

}

.footer-logo {

}

.footer-logo img {
    width: 60px; /* Adjust width as needed */
    height: auto; /* Maintain aspect ratio */

    align-items: center;

}

.social-links {
    margin-bottom: 20px; 
}

.links {
    margin-bottom: 30px; 
    margin-top: 50px;
    align-items: center;
 
}
</style>
