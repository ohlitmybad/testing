<!DOCTYPE html>
<html>
<head>
  <title>Player Search</title>
<style>
/* Add custom CSS to style the layout */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
}

.container {
  display: flex;
  flex-wrap: wrap; /* Enable wrapping of flex items */
}

.inputs {
  flex: 0 0 20%;
  padding: 30px;
  flex-direction: column; /* Stack the inputs vertically */
font-size: 12px;
}

.inputs input {
  margin-bottom: 10px;
}

    img {
            width: 35px;
position: absolute;
top: 30px;
pointer-events: none;
z-index: 40000; 
left: 140px;
opacity: 1;
        }

form {
  display: flex;
  flex-direction: column;
}

label {
  margin-bottom: 5px;
}

button {
  margin-top: 10px;
}

table {
  border-collapse: collapse;
  width: 70%;
position: absolute;
  top: 300px;
Right: 3%;
}

/* Apply styles to header cells and data cells */
th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: left;
  user-select: none; /* Prevent text selection in table cells */
}


td {
  font-size: 13px;
}



/* Set the desired fixed width for the rest of the data cells */
td:not(:first-child) {
text-align: center;

}

/* Set the desired fixed width for the header cells (including the first column) */
th {
  background-color: #f2f2f2;
  font-size: 10px; /* Set the desired font size for header cells */
text-align: center;

}

th:first-child {
  width: 120px;
}


/* Apply fixed table layout */
table {
  table-layout: fixed;
}





</style>
</head>
<body>
	 <img src="https://i.imgur.com/UurMbGS.png" alt="Logo">

<div class="container">
  <div class="inputs">
  <form id="searchForm">
    <h3>Player Search</h3>
    <select id="datasetSelector">
      <option value="dataset1">GK</option>
      <option value="dataset2">CB</option>
      <!-- Add more options for additional datasets if needed -->
    </select>

    <h3></h3>
    <label for="defensiveActions">Defensive Actions</label>
    <input type="number" id="defensiveActionsLow" min="0" max="100" placeholder="Percentile 0-100">

    <label for="aerialsContested">Aerials Contested</label>
    <input type="number" id="aerialsContestedLow" min="0" max="100" placeholder="Percentile 0-100">

    <label for="exitLine">Exit Line</label>
    <input type="number" id="exitLineLow" min="0" max="100" placeholder="Percentile 0-100">

    <label for="passes">Passes</label>
    <input type="number" id="passesLow" min="0" max="100" placeholder="Percentile 0-100">

    <label for="longPassPercentage">Long Pass %</label>
    <input type="number" id="longPassPercentageLow" min="0" max="100" placeholder="Percentile 0-100">

    <label for="shortPassPercentage">Short Pass %</label>
    <input type="number" id="shortPassPercentageLow" min="0" max="100" placeholder="Percentile 0-100">

    <label for="psxg">PSxG - GA</label>
    <input type="number" id="psxgLow" min="0" max="100" placeholder="Percentile 0-100">

 
    <h3></h3>
    <label for="ageLow">Age</label>
    <input type="number" id="ageLow" min="0" placeholder="15">
    <label for="ageHigh"></label>
    <input type="number" id="ageHigh" min="0" placeholder="45">

    <h3></h3>
    <label for="minutesPlayedLow">Minutes Played</label>
    <input type="number" id="minutesPlayedLow" min="0" placeholder="0">
    <label for="minutesPlayedHigh"></label>
    <input type="number" id="minutesPlayedHigh" min="0" placeholder="10,000">

    <button type="submit">Search</button>
  </form>
  </div>
</div>
  <div id="resultsContainer">
    <!-- The search results will be displayed here -->
  </div> 
  <script>
    // Sample player data in CSV format for GK
    const csvData1 = `1,Diogo Costa,Porto,0.500,0.243,0.382,0.878,0.539,0.793,0.563,4755,23
2,G. Donnarumma,PSG,0.105,0.234,0.329,0.197,0.016,0.737,0.908,4991,24
3,Alisson,Liverpool,0.826,0.648,0.230,0.862,0.224,0.539,0.625,5013,30
4,Ederson,Man City,0.395,0.188,0.089,0.842,0.280,0.484,0.316,4624,29`;

    // Sample player data in CSV format for CB
    const csvData2 = `1,J. Timber,Ajax,0.986,0.957,0.895,0.320,0.764,0.248,0.964,5233,21
2,Danilo,Juventus,0.773,0.776,0.800,0.304,0.206,0.555,0.644,5359,31
3,N. Otamendi,Benfica,0.925,0.918,0.269,0.345,0.511,0.592,0.790,5266,35
4,J. Egan,Sheffield United,0.382,0.166,0.592,0.513,0.650,0.521,0.333,5238,30`;

    // Store data for each dataset in separate arrays
    const dataArray1 = csvData1.split('\n').map(line => line.split(','));
    const dataArray2 = csvData2.split('\n').map(line => line.split(','));

    // Metric names for GK
    const metricNames1 = [
      'Defensive Actions',
      'Aerials Contested',
      'Exit Line',
      'Passes',
      'Long Pass %',
      'Short Pass %',
      'PSxG - GA'
    ];

    // Metric names for CB
    const metricNames2 = [
      'Passes completed',
      'Forward pass%',
      'Progressive pass',
      'Defensive actions',
      'Defensive duel%',
      'Aerial duel%',
      'Progressive carries'
    ];

    // Function to update metric labels based on the selected dataset
    function updateMetricLabels(dataset) {
      const labels = document.getElementsByTagName('label');
      const metricLabels = dataset === 'dataset2' ? metricNames2 : metricNames1;
      for (let i = 0; i < metricLabels.length; i++) {
        labels[i].textContent = metricLabels[i] + '';
      }
    }


  function reverseSearch(percentiles, dataArray) {
      return dataArray.filter(data => {
        for (let i = 3; i <= 9; i++) {
          const metricValue = parseFloat(data[i]) * 100;
          if (metricValue < percentiles[i - 3][0]) {
            return false;
          }
        }

        const age = parseInt(data[11]);
        if (age < percentiles[7][0] || age > percentiles[7][1]) {
          return false;
        }

        const minutesPlayed = parseInt(data[10]);
        if (minutesPlayed < percentiles[8][0] || (percentiles[8][1] && minutesPlayed > percentiles[8][1])) {
          return false;
        }

        return true;
      });
    }


    document.getElementById('datasetSelector').addEventListener('change', function() {
      const selectedDataset = document.getElementById('datasetSelector').value;
      if (selectedDataset === 'dataset2') {
        updateMetricLabels('dataset2');
      } else {
        updateMetricLabels('dataset1');
      }
    });


 function clearSearchInputs() {
    // Clear all input fields
    const inputs = document.querySelectorAll('input[type="number"]');
    inputs.forEach(input => (input.value = ''));

    // Clear the results container
    const resultsContainer = document.getElementById('resultsContainer');
    resultsContainer.innerHTML = '';
  }

  document.getElementById('datasetSelector').addEventListener('change', function () {
    const selectedDataset = document.getElementById('datasetSelector').value;
    if (selectedDataset === 'dataset2') {
      updateMetricLabels('dataset2');
    } else {
      updateMetricLabels('dataset1');
    }

    // Clear the search inputs and results when the data selector changes
    clearSearchInputs();
  });


    document.getElementById('searchForm').addEventListener('submit', function(event) {
      event.preventDefault();

      // Get the user-entered percentile values from the form
      const defensiveActionsLow = parseInt(document.getElementById('defensiveActionsLow').value);
      const aerialsContestedLow = parseInt(document.getElementById('aerialsContestedLow').value);
      const exitLineLow = parseInt(document.getElementById('exitLineLow').value);
      const passesLow = parseInt(document.getElementById('passesLow').value);
      const longPassPercentageLow = parseInt(document.getElementById('longPassPercentageLow').value);
      const shortPassPercentageLow = parseInt(document.getElementById('shortPassPercentageLow').value);
      const psxgLow = parseInt(document.getElementById('psxgLow').value);
      const ageLow = parseInt(document.getElementById('ageLow').value);
      const ageHigh = parseInt(document.getElementById('ageHigh').value);
      const minutesPlayedLow = parseInt(document.getElementById('minutesPlayedLow').value);
      const minutesPlayedHigh = parseInt(document.getElementById('minutesPlayedHigh').value);

      const percentilesInput = [
        [defensiveActionsLow],     // Defensive actions (low percentile value)
        [aerialsContestedLow],     // Aerials contested (low percentile value)
        [exitLineLow],             // Exit Line (low percentile value)
        [passesLow],               // Passes (low percentile value)
        [longPassPercentageLow],   // Long Pass % (low percentile value)
        [shortPassPercentageLow],  // Short Pass % (low percentile value)
        [psxgLow],                 // PSxG - GA (low percentile value)
        [ageLow, ageHigh],         // Age (low and high percentile values)
        [minutesPlayedLow, minutesPlayedHigh]   // Minutes Played (low and high percentile values)
      ];

      // Perform the reverse search based on user-entered percentiles and selected dataset
      const restrictedPlayers = document.getElementById('datasetSelector').value === 'dataset2'
        ? reverseSearch(percentilesInput, dataArray2)
        : reverseSearch(percentilesInput, dataArray1);

    const resultsContainer = document.getElementById('resultsContainer');
  resultsContainer.innerHTML = '';

  if (restrictedPlayers.length === 0) {
    const noResultsMessage = document.createElement('p');
    noResultsMessage.textContent = 'No players found matching the specified percentiles.';
    resultsContainer.appendChild(noResultsMessage);
  } else {
    const resultHeader = document.createElement('h3');
    resultHeader.textContent = '';
    resultsContainer.appendChild(resultHeader);

    // Create the table element
    const table = document.createElement('table');
    resultsContainer.appendChild(table);

    // Create the table header row
    const headerRow = document.createElement('tr');
    table.appendChild(headerRow);

const selectedDataset = document.getElementById('datasetSelector').value;
const metricLabels = selectedDataset === 'dataset2' ? metricNames2 : metricNames1;

// Create an extra empty header cell at the beginning
const emptyHeaderCell = document.createElement('th');
emptyHeaderCell.textContent = ''; // You can put any content here or leave it empty
headerRow.appendChild(emptyHeaderCell);

for (const metricLabel of metricLabels) {
  const headerCell = document.createElement('th');
  headerCell.textContent = metricLabel;
  headerRow.appendChild(headerCell);
}

    // Add the player data rows to the table
    restrictedPlayers.forEach(playerData => {
      const playerRow = document.createElement('tr');
      table.appendChild(playerRow);

      // Add the player name and other info in the first column
      const playerNameCell = document.createElement('td');
const playerName = playerData[1];
const playerData2 = playerData[2];
const playerData11 = playerData[11];

// Create a formatted HTML string
const formattedText = `<span>${playerName}</span><br><span style="font-style: italic">${playerData2}, ${playerData11}</span>`;

// Set the formatted HTML as the content of playerNameCell
playerNameCell.innerHTML = formattedText;      playerRow.appendChild(playerNameCell);

      // Add the player metric values in the subsequent columns
      for (let i = 3; i <= 9; i++) {
        const metricValueCell = document.createElement('td');
        metricValueCell.textContent = (parseFloat(playerData[i]) * 100).toFixed(2);
        playerRow.appendChild(metricValueCell);
      }
    });
  }
});
  </script>
</body>
</html>
