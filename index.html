<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=0.49, user-scalable=no">

    <title>Embedded Page</title>
	
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7677714701428206"
     crossorigin="anonymous"></script>
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">
    <iframe src="https://datamb.football/testing1/" width="100%" height="100%" frameborder="0" style="position: absolute; top: 0; left: 0;"></iframe>


<script>
    // Function to scroll down a tiny bit
    function scrollDown() {
        window.scrollBy(0, 100); // Adjust the value (20) to change the scroll distance
    }

    // Scroll down when the page loads
    window.addEventListener('load', scrollDown);
</script>

	<script>
    // Function to scroll up a tiny bit
    function scrollUp() {
        window.scrollBy(0, -100); // Adjust the value (-70) to change the scroll distance
    }

    // Scroll up when the page loads
    window.addEventListener('load', scrollUp);
</script>


</body>

	
</html>
