<script>
const dataCSV = `M. Brouwer (Goalkeeper),https://talkdatamb.github.io/M_Brouwer_Goalkeeper_stats
Wolverhampton Wanderers (Team),https://talkdatamb.github.io/Wolverhampton_Wanderers_Team_stats
M. Brsuwer (Goalkeeper),https://talkdatamb.github.io/M_Brouwer_Goalkeeper_stats
Wolvertampton Wanderers (Team),https://talkdatamb.github.io/Wolverhampton_Wanderers_Team_stats
M. Breuwer (Goalkeeper),https://talkdatamb.github.io/M_Brouwer_Goalkeeper_stats
Wolverhampton Wanderers (Team),https://talkdatamb.github.io/Wolverhampton_Wanderers_Team_stats
`; // Replace ... with the rest of your CSV data

const dataLines = dataCSV.split('\n');
const searchButton = document.getElementById('searchButton');
const searchInputModal = document.getElementById('searchInputModal');
const searchInput = document.getElementById('searchInput');
const autocompleteBox = document.getElementById('autocompleteBox');

// Convert CSV data to an array of objects
const data1 = dataLines.map(line => {
    const [name, link] = line.split(',');
    return { name, link };
});

function search2(query) {
    autocompleteBox.innerHTML = '';

    const filteredData = data1.filter(item => {
        const sanitizedItem = item.name.replace(/[^\w\s]/g, '').toLowerCase();
        const sanitizedQuery = query.replace(/[^\w\s]/g, '').toLowerCase();
        return sanitizedItem.includes(sanitizedQuery);
    });

    if (filteredData.length === 0) {
        autocompleteBox.style.display = 'none';
        return;
    }

    filteredData.forEach(item => {
        const listItem = document.createElement('div');
        const link = document.createElement('a');
        link.href = item.link;
        link.textContent = item.name;
        listItem.appendChild(link);
        autocompleteBox.appendChild(listItem);
    });

    autocompleteBox.style.display = 'block';
}

searchButton.addEventListener('click', () => {
    searchInputModal.style.display = 'block';
});

searchInput.addEventListener('input', () => {
    const query = searchInput.value;
    if (query.trim() === '') {
        autocompleteBox.style.display = 'none';
    } else {
        search2(query);
    }
});

document.addEventListener('click', (event) => {
    if (event.target === searchInputModal) {
        searchInputModal.style.display = 'none';
    }
});



</script>
